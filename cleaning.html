<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- スマホ対応に必須のviewport設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KONA RESORT 清掃担当カレンダー</title>
    <!-- 検索エンジンにインデックスされないようにする設定 -->
    <meta name="robots" content="noindex, nofollow">
    <!-- スタイリングにTailwind CSSを使用 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Googleカレンダーのiframeをレスポンシブにするための調整 */
        .calendar-wrapper {
            position: relative;
            width: 100%;
            /* スマホでは高さを画面の75%程度確保して見やすくする */
            height: 75vh;
            min-height: 500px;
        }
        @media (min-width: 768px) {
            .calendar-wrapper {
                /* PC・タブレットでは高さを固定 */
                height: 700px;
            }
        }
        .calendar-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="bg-emerald-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- ヘッダー部分 -->
    <header class="bg-emerald-700 text-white p-5 shadow-md">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-2xl md:text-3xl font-bold tracking-widest">KONA RESORT</h1>
            <p class="text-sm md:text-base mt-2 opacity-90 font-medium tracking-wider">清掃担当カレンダー</p>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-grow p-4 md:p-8 w-full max-w-5xl mx-auto">
        <div class="bg-white p-2 md:p-4 rounded-xl shadow-lg border border-emerald-100">
            <!-- カレンダーコンテナ -->
            <div class="calendar-wrapper rounded-lg overflow-hidden">
                <!-- ユーザー指定のGoogleカレンダー埋め込みコード（width/height属性を外しCSSで制御） -->
                <iframe src="https://calendar.google.com/calendar/embed?src=c_229e7c2ce3552b4e40770879c09447d8ccae77612301b2d9fb763c80cd2bae9a%40group.calendar.google.com&color=%237986CB&src=4a7ae635b03efe0708afcf32623d0f806c783b0a12ef09dd43445f8a57179c0b%40group.calendar.google.com&color=%23D50000&src=c_1f353f8c6146ded9c76ae2ca128e84460117ce4fb6c99a3f3f1b958a788f584c%40group.calendar.google.com&color=%23CCCCCC&ctz=Asia%2FTokyo" style="border: 0" frameborder="0" scrolling="no"></iframe>
            </div>
        </div>

        <!-- フォールバック用のリンク（Safari等の設定で表示されない場合への配慮） -->
        <div class="mt-6 text-center text-sm text-gray-600">
            <p>※カレンダーがうまく表示されない場合は、<a href="https://calendar.google.com/calendar/embed?src=c_229e7c2ce3552b4e40770879c09447d8ccae77612301b2d9fb763c80cd2bae9a%40group.calendar.google.com&color=%237986CB&src=4a7ae635b03efe0708afcf32623d0f806c783b0a12ef09dd43445f8a57179c0b%40group.calendar.google.com&color=%23D50000&src=c_1f353f8c6146ded9c76ae2ca128e84460117ce4fb6c99a3f3f1b958a788f584c%40group.calendar.google.com&color=%23CCCCCC&ctz=Asia%2FTokyo" target="_blank" rel="noopener noreferrer" class="text-emerald-600 underline font-bold hover:text-emerald-800 transition-colors">こちらをクリック</a>して別画面で開いてください。</p>
        </div>
    </main>

    <!-- フッター -->
    <footer class="bg-emerald-900 text-emerald-100 text-center p-4 text-xs tracking-wider mt-auto">
        &copy; 2026 KONA RESORT. All Rights Reserved.
    </footer>

</body>
</html>

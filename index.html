<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- スマホ対応に必須のviewport設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KONA OCEAN CLUB 予約カレンダー</title>
    <!-- 検索エンジンにインデックスされないようにする設定 -->
    <meta name="robots" content="noindex, nofollow">
    <!-- スタイリングにTailwind CSSを使用 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Googleカレンダーのiframeをレスポンシブにするための調整 */
        .calendar-wrapper {
            position: relative;
            width: 100%;
            /* スマホでは高さを画面の75%程度確保して見やすくする */
            height: 75vh;
            min-height: 500px;
        }
        @media (min-width: 768px) {
            .calendar-wrapper {
                /* PC・タブレットでは高さを固定 */
                height: 700px;
            }
        }
        .calendar-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="bg-sky-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- ヘッダー部分 -->
    <header class="bg-cyan-700 text-white p-5 shadow-md">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-2xl md:text-3xl font-bold tracking-widest">KONA OCEAN CLUB</h1>
            <p class="text-sm md:text-base mt-2 opacity-90 font-medium tracking-wider">予約カレンダー</p>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-grow p-4 md:p-8 w-full max-w-5xl mx-auto">
        <div class="bg-white p-2 md:p-4 rounded-xl shadow-lg border border-sky-100">
            <!-- カレンダーコンテナ -->
            <div class="calendar-wrapper rounded-lg overflow-hidden">
                <!-- ユーザー指定のGoogleカレンダー埋め込みコード（width/height属性を外しCSSで制御） -->
                <iframe src="https://calendar.google.com/calendar/embed?src=c_863e3ae1649e0e82ebeef2a8f37dde53574e9db3694e5fd699ad4bc8b7f63782%40group.calendar.google.com&ctz=Asia%2FTokyo" style="border: 0" frameborder="0" scrolling="no"></iframe>
            </div>
        </div>

        <!-- フォールバック用のリンク（Safari等の設定で表示されない場合への配慮） -->
        <div class="mt-6 text-center text-sm text-gray-600">
            <p>※カレンダーがうまく表示されない場合は、<a href="https://calendar.google.com/calendar/embed?src=c_863e3ae1649e0e82ebeef2a8f37dde53574e9db3694e5fd699ad4bc8b7f63782%40group.calendar.google.com&ctz=Asia%2FTokyo" target="_blank" rel="noopener noreferrer" class="text-cyan-600 underline font-bold hover:text-cyan-800 transition-colors">こちらをクリック</a>して別画面で開いてください。</p>
        </div>
    </main>

    <!-- フッター -->
    <footer class="bg-cyan-900 text-cyan-100 text-center p-4 text-xs tracking-wider mt-auto">
        &copy; 2026 KONA OCEAN CLUB. All Rights Reserved.
    </footer>

</body>
</html>
